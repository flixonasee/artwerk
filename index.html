:root {
  --f: arial;
  --black: #0a0a0a;
  --g1: #f2f2f2;
  --g2: #e0e0e0;
  --g3: #0a0a0a;
  --g4: #0a0a0a;
  --white: #fff;
  --hh: 44px;
  --fh: 38px;
  --dh: 36px;
  --chrome: calc(44px + 38px + 36px);
  --col: 270px;
  --c-all: #0a0a0a;
  --c-art: #7d460b;
  --c-design: #ff0000;
  --c-venezia: #538bb3;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; -webkit-text-size-adjust: 100%; }
body {
  height: 100%;
  overflow: hidden;
  font-family: var(--f);
  background: var(--white);
  color: var(--black);
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
}

/* HEADER */
#hd {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 50;
  height: var(--hh);
  background: var(--white);
  border-bottom: 1px solid var(--black);
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  justify-content: space-between;
}

#hd-t {font-size: 11px;font-weight: 500;letter-spacing: 0.04em;text-transform: uppercase;}
#hd-d { font-size: 10px; font-weight: 300; color: var(--black); letter-spacing: 0.04em; }

/* FILTER */
#fb {
  position: fixed;
  top: var(--hh);
  left: 0;
  right: 0;
  z-index: 49;
  height: var(--fh);
  border-bottom: 1px solid var(--black);
  display: flex;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
#fb::-webkit-scrollbar { display: none; }
.fb {
  flex-shrink: 0;
  height: 100%;
  padding: 0 20px;
  border: none;
  /* border-right: 1px solid var(--black); */
  background: transparent;
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--black);
  cursor: pointer;
  transition: background 0.12s, color 0.12s;
  white-space: nowrap;
}

.fb[onclick*="'all'"].on    { background: var(--c-all);     color: var(--white); }
.fb[onclick*="'art'"].on    { background: var(--c-art);     color: var(--white); }
.fb[onclick*="'design'"].on { background: var(--c-design);  color: var(--white); }
.fb[onclick*="'venezia'"].on{ background: var(--c-venezia); color: var(--white); }

/* DAYS */
#ds {
  position: fixed;
  top: calc(var(--hh) + var(--fh));
  left: 0;
  right: 0;
  z-index: 48;
  height: var(--dh);
  background: var(--white);
  border-bottom: 1px solid var(--black);
  display: flex;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
#ds::-webkit-scrollbar { display: none; }
.db {
  flex-shrink: 0;
  height: 100%;
  padding: 0 14px;
  border: none;
  /* border-right: 1px solid var(--black); */
  background: transparent;
  font-family: var(--f);
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.2px;
  text-transform: uppercase;
  color: var(--black);
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.12s, color 0.12s;
}

/* TIMELINE */
#to {
  position: fixed; top: var(--chrome); left: 0; right: 0; bottom: 0;
  overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch;
  scrollbar-width: thin; scrollbar-color: var(--g2) transparent;
}
#to::-webkit-scrollbar { height: 2px; }
#to::-webkit-scrollbar-thumb { background: var(--g2); }
#ti { display: flex; height: 100%; padding: 0 16px; }

/* DAY COL */
.dc {
  flex-shrink: 0;
  width: var(--col);
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  border-right: 1px solid var(--black);
  padding: 20px 18px 60px 0;
}
.dc + .dc { padding-left: 18px; }
.dc::-webkit-scrollbar { display: none; }

.ch {margin-bottom: 0px;}
.cd {font-size: 10px;font-weight: 400;letter-spacing: 0em;color: var(--black);text-transform: uppercase;margin-bottom: 1px;text-align: center;}
.cn {font-size: 19px;font-weight: 400;line-height: 2;letter-spacing: -1px;color: var(--black);background: #eeeeee;border-radius: 20px;border: solid 1px #000;text-align: center;}
.cr { margin-top: 8px; height: 1px; background: var(--black); }

/* CARD */
.card {padding: 11px 0;border-bottom: 1px solid var(--black);margin-bottom: 0px;}
.card:last-child { border-bottom: none; }
.ct  {font-size: 13px;font-weight: 400;letter-spacing: 0em;color: var(--black);margin-bottom: 4px;text-transform: uppercase;}
.cn2 {font-size: 15px;font-weight: 400;line-height: 1.2;margin-bottom: 4px;color: var(--black);}
.cv  {font-size: 13px;font-weight: 400;color: var(--black);line-height: 1.1;margin-top: 20px;}
.ca  {font-size: 13px;font-weight: 400;color: var(--black);margin-top: 1px;margin-bottom: 24px;line-height: 1;}
.cr2 { display: flex; align-items: center; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
.ci  {
  font-size: 8px;
  font-weight: 400;
  letter-spacing: 0.2px;
  text-transform: none;
  border: 0.7px solid var(--black);
  border-radius: 20px;
  padding: 2px 8px;
  color: var(--black);
  white-space: nowrap;
}
.ctag { font-size: 10px; line-height: 1; }
.cact {display: flex;gap: 12px;margin-top: 8px;align-items: center;margin-bottom: 11px;}
.cl {
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.3px;
  text-transform: none;
  color: var(--black);
  text-decoration: none;
  border: none;
  border-bottom: 1px solid var(--black);
  padding-bottom: 1px;
  cursor: pointer;
  background: none;
  font-family: var(--f);
}

/* COUNTER */
#ctr {
  position: fixed; bottom: 12px; right: 14px; z-index: 40;
  font-size: 9px; font-weight: 400; letter-spacing: 0.04em;
  text-transform: uppercase; color: var(--black);
}

/* CAL SHEET */
#cs { position: fixed; inset: 0; z-index: 200; display: none; }
#cs.open { display: block; }
#cs-bd { position: absolute; inset: 0; background: rgba(0,0,0,0.25); }
#cs-pn {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--white); border-top: 1px solid var(--black);
  padding-bottom: max(env(safe-area-inset-bottom, 0px), 16px);
}
#cs-hnd { width: 32px; height: 3px; background: var(--g2); border-radius: 2px; margin: 12px auto 0; }
#cs-inf { padding: 16px 20px 12px; border-bottom: 1px solid var(--g2); }
#cs-tt  { font-size: 13px; font-weight: 500; line-height: 1.3; margin-bottom: 3px; }
#cs-sb  { font-size: 10px; font-weight: 300; color: var(--black); letter-spacing: 0.04em; }
.co {
  display: flex; align-items: center; gap: 14px; padding: 14px 20px;
  border-bottom: 1px solid var(--g2); text-decoration: none; color: var(--black);
  cursor: pointer; transition: background 0.1s; -webkit-tap-highlight-color: transparent;
}
.co:last-of-type { border-bottom: none; }
.co:active { background: var(--g1); }
.co-ic { font-size: 20px; width: 28px; text-align: center; }
.co-lb { font-size: 12px; font-weight: 400; }
.co-ds { font-size: 10px; font-weight: 300; color: var(--black); margin-top: 1px; }
#cs-cl {
  width: 100%; padding: 14px; border: none; border-top: 1px solid var(--g2);
  background: transparent; font-family: var(--f); font-size: 11px; font-weight: 400;
  letter-spacing: 0.04em; text-transform: uppercase; color: var(--black); cursor: pointer; margin-top: 4px;
}
#cs-cl:active { background: var(--g1); }

/* LOGIN */
#lg {
  position: fixed; inset: 0; z-index: 300; background: var(--white);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
#lg-img { height: 240px; width: auto; display: block; mix-blend-mode: multiply; margin-bottom: 8px; }
#lg input {
  border: none; border-bottom: 1px solid var(--black); outline: none;
  font-family: var(--f); font-size: 13px; font-weight: 300; text-align: center;
  padding: 8px 0; width: 160px; background: transparent; letter-spacing: 0.04em; color: var(--black);
}
#lg-err { margin-top: 10px; height: 14px; font-size: 9px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--black); }

/* DOTS */
.cdot {
  display: inline-block; width: 7px; height: 7px; border-radius: 50%;
  flex-shrink: 0; margin-right: 6px; vertical-align: middle; position: relative; top: -1px;
}
.cdot-art     { background: var(--c-art); }
.cdot-design  { background: var(--c-design); }
.cdot-venezia { background: var(--c-venezia); }

/* COLOR MODE */
body.color .cn2 { color: var(--card-color, var(--ink)); }
body.color .cv  { color: var(--card-color, var(--ink)); }
body.color .ca  { color: var(--card-color, var(--ink)); }
body.color .ct  { color: var(--card-color, var(--ink)); }
body.color .cl  { color: var(--card-color, var(--ink)); border-color: var(--card-color, var(--ink)); }
body.color .ci  { color: var(--card-color, var(--ink)); border-color: var(--card-color, var(--ink)); }
body.color .card { border-bottom-color: var(--card-color, var(--ink)); }

/* SWITCHES */
.hd-switches { display: flex; align-items: center; gap: 6px; }
.sw-btn {
  font-family: var(--f);
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: transparent;
  color: var(--ink);
  padding: 4px 9px;
  line-height: 1;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.12s, color 0.12s;
}
.sw-btn.on { background: var(--ink); color: var(--bg); }

/* CAL BUTTON */
#hd-cal {
  font-family: var(--f);
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: transparent;
  color: var(--ink);
  padding: 4px 9px;
  line-height: 1;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.12s, color 0.12s;
}
#hd-cal:active { background: var(--ink); color: var(--bg); }
</style>
</head>

  {week:"Design Week",date:"22.04",start:"18:30",end:"21:00",event:"Paul & Shark x Archivio Alessandro Mendini – Cocktail",venue:"Paul & Shark Boutique",address:"Via Montenapoleone 16",cocktail:1,notes:"Karla Otto"},
  {week:"Art Week",date:"14.04",start:"18:00",end:"21:00",event:"Vernissage – Launch",venue:"Gallerie d'Italia",address:"",cocktail:1,notes:"Karla Otto"},

  {week:"Design Week",date:"20.04",start:"21:00",end:"",event:"Compleanno Flaminia Veronesi",venue:"",address:"Via Lorenteggio 157",cocktail:1,notes:""},

];

const DAYS  = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
const MONTHS= ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
const pad   = n => String(n).padStart(2,'0');
const IMAP  = {'P:S':'P:S Studio','Karla Otto':'Karla Otto','ALCOVA':'ALCOVA',"nctm e l'arte":"nctm e l'arte",'Biennale Arte 2026':'Biennale 2026','Enel':'Enel','chert ludde':'chert ludde'};

function pDate(d) { const [dy,mo]=d.split('.').map(Number); return new Date(2026,mo-1,dy); }
function dow(d)   { return DAYS[pDate(d).getDay()]; }
function mon(d)   { return MONTHS[parseInt(d.split('.')[1])-1]; }

// ICS
function makeICS(ev) {
  const [dy,mo] = ev.date.split('.').map(Number);
  const ds = `2026${pad(mo)}${pad(dy)}`;
  const toT = t => t ? `${ds}T${t.replace(':','')}00` : ds;
  const endT = ev.end ? toT(ev.end) : ev.start ? `${ds}T${pad(parseInt(ev.start)+2)}${ev.start.slice(2)}00` : ds;
  const loc = [ev.venue, ev.address].filter(Boolean).join(', ');
  return ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Artwerk//Agenda 2026//IT','CALSCALE:GREGORIAN',
    'BEGIN:VEVENT',
    `UID:${ds}-${Math.random().toString(36).slice(2)}@artwerk`,
    `DTSTAMP:${ds}T000000Z`,
    `DTSTART:${toT(ev.start)}`,
    `DTEND:${endT}`,
    `SUMMARY:${ev.event}`,
    loc  ? `LOCATION:${loc}`  : null,
    ev.notes ? `DESCRIPTION:${ev.notes}` : null,
    'END:VEVENT','END:VCALENDAR',
  ].filter(Boolean).join('\r\n');
}
function icsUrl(ev) { return 'data:text/calendar;charset=utf-8,'+encodeURIComponent(makeICS(ev)); }
function gcUrl(ev) {
  const [dy,mo]=ev.date.split('.').map(Number);
  const ds=`2026${pad(mo)}${pad(dy)}`;
  const toG=t=>t?`${ds}T${t.replace(':','')}00`:ds;
  const loc=[ev.venue,ev.address].filter(Boolean).join(', ');
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(ev.event)}&dates=${toG(ev.start)}/${ev.end?toG(ev.end):toG(ev.start)}&location=${encodeURIComponent(loc)}&details=${encodeURIComponent(ev.notes||'')}`;
}

// CAL SHEET
function openCS(ev) {
  const ts = ev.start ? (ev.end ? `${ev.start} – ${ev.end}` : ev.start) : '';
  document.getElementById('cs-tt').textContent = ev.event;
  document.getElementById('cs-sb').textContent = [ev.date, ts, ev.venue].filter(Boolean).join(' · ');
  const url  = icsUrl(ev);
  const name = ev.event.replace(/[^a-z0-9]/gi,'_').toLowerCase()+'.ics';
  const ap = document.getElementById('co-ap');
  ap.href = url; ap.download = name;
  ap.onclick = () => setTimeout(closeCS, 400);
  document.getElementById('co-gc').href = gcUrl(ev);
  const ic = document.getElementById('co-ic');
  ic.href = url; ic.download = name;
  document.getElementById('cs').classList.add('open');
}
function closeCS() { document.getElementById('cs').classList.remove('open'); }

// RENDER
let filter = 'all';

function setF(f, btn) {
  filter = f;
  document.querySelectorAll('.fb').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  buildDays(); buildTL();
}

function vis() {
  return events.filter(e =>
    filter==='all' ||
    (filter==='art'     && e.week==='Art Week') ||
    (filter==='design'  && e.week==='Design Week') ||
    (filter==='venezia' && e.week==='Venezia')
  );
}

function forDate(d) {
  return vis().filter(e=>e.date===d).sort((a,b)=>(a.start||'00:00').localeCompare(b.start||'00:00'));
}

function buildDays() {
  const strip = document.getElementById('ds');
  strip.innerHTML = '';
  [...new Set(vis().map(e=>e.date))].sort((a,b)=>pDate(a)-pDate(b)).forEach(date => {
    const [dy] = date.split('.');
    const btn = document.createElement('button');
    btn.className='db'; btn.dataset.date=date;
    btn.textContent=`${dow(date)} ${dy}`;
    btn.onclick=()=>{
      const col=document.querySelector(`.dc[data-date="${date}"]`);
      if(col) document.getElementById('to').scrollTo({left:col.offsetLeft-16,behavior:'smooth'});
    };
    strip.appendChild(btn);
  });
}

function buildTL() {
  const inner = document.getElementById('ti');
  inner.innerHTML = '';
  let total = 0;
  [...new Set(vis().map(e=>e.date))].sort((a,b)=>pDate(a)-pDate(b)).forEach(date=>{
    const evs=forDate(date); if(!evs.length) return;
    const [dy]=date.split('.');
    const city=evs[0].week==='Venezia'?'Venezia':'Milano';
    const col=document.createElement('div');
    col.className='dc'; col.dataset.date=date;
    const h=document.createElement('div'); h.className='ch';
    h.innerHTML=`<div class="cd">${dow(date)} · ${mon(date)}</div><div class="cn">${dy}</div><div class="cr"></div>`;
    col.appendChild(h);
    evs.forEach(ev=>{
      total++;
      const ts=ev.start?(ev.end?`${ev.start} – ${ev.end}`:ev.start):'';
      const sq=[ev.venue,ev.address,city].filter(Boolean).join(', ');
      const mu=sq?`https://maps.google.com/?q=${encodeURIComponent(sq)}`:'';
      const inv=ev.notes?(IMAP.hasOwnProperty(ev.notes)?IMAP[ev.notes]:ev.notes):'';
      const c=document.createElement('div'); c.className='card';
      const dotClass = ev.week==='Art Week'?'cdot-art':ev.week==='Design Week'?'cdot-design':'cdot-venezia';
      const cardColor = ev.week==='Art Week'?'var(--c-art)':ev.week==='Design Week'?'var(--c-design)':'var(--c-venezia)';
      c.style.setProperty('--card-color', cardColor);
      c.innerHTML=`
        ${ts?`<div class="ct">${ts}</div>`:''}
        <div class="cn2"><span class="cdot ${dotClass}"></span>${ev.cocktail?'🍸 ':''}${ev.event}</div>
        ${ev.venue?`<div class="cv">${ev.venue}</div>`:''}
        ${ev.address?`<div class="ca">${ev.address}</div>`:''}
        ${inv?`<div class="cr2"><span class="ci">${inv}</span></div>`:''}
        <div class="cact">
          ${mu?`<a class="cl" href="${mu}" target="_blank" rel="noopener">↗ mappa</a>`:''}
        </div>`;
      col.appendChild(c);
    });
    inner.appendChild(col);
  });
  document.getElementById('ctr').textContent=`${total}`;
}

// SCROLL SYNC
document.getElementById('to').addEventListener('scroll',function(){
  const cols=document.querySelectorAll('.dc');
  const x=this.scrollLeft+40; let active=null;
  cols.forEach(c=>{if(c.offsetLeft<=x) active=c.dataset.date;});
  document.querySelectorAll('.db').forEach(p=>{
    const on=p.dataset.date===active;
    p.classList.toggle('on',on);
    if(on) p.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  });
},{passive:true});


// DARK / COLOR TOGGLES
function toggleDark(btn) {
  document.body.classList.toggle('dark');
  btn.classList.toggle('on');
}
function toggleColor(btn) {
  document.body.classList.toggle('color');
  btn.classList.toggle('on');
}

// CALENDAR SUBSCRIBE
function subscribeAll() {
  const pad = n => String(n).padStart(2,'0');
  const lines = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Agenda 2026//IT',
    'CALSCALE:GREGORIAN','X-WR-CALNAME:Agenda 2026','X-WR-TIMEZONE:Europe/Rome'];
  events.forEach(ev => {
    const [dy,mo] = ev.date.split('.').map(Number);
    const ds = `2026${pad(mo)}${pad(dy)}`;
    const toT = t => t ? `${ds}T${t.replace(':','')}00` : ds;
    const endT = ev.end ? toT(ev.end) : ev.start ? (()=>{
      const [hh,mm] = ev.start.split(':').map(Number);
      const tot = hh*60+mm+60;
      return `${ds}T${pad(Math.floor(tot/60)%24)}${pad(tot%60)}00`;
    })() : ds;
    const loc = [ev.venue, ev.address].filter(Boolean).join(', ');
    lines.push('BEGIN:VEVENT',
      `UID:${ds}-${Math.random().toString(36).slice(2)}@agenda2026`,
      `DTSTAMP:20260101T000000Z`,
      `DTSTART:${toT(ev.start)}`, `DTEND:${endT}`,
      `SUMMARY:${ev.cocktail?'🍸 ':''}${ev.event}`,
      `CATEGORIES:${ev.week}`,
      ...(loc ? [`LOCATION:${loc}`] : []),
      ...(ev.notes ? [`DESCRIPTION:${ev.notes}`] : []),
      'END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  const blob = new Blob([lines.join('\r\n')], {type:'text/calendar;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='agenda2026.ics';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

  const ELS='#hd,#fb,#ds,#to,#ctr';
  document.querySelectorAll(ELS).forEach(el=>el.style.display='none');
  async function sha(s){
    const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
    return Array.from(new Uint8Array(b)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  const inp=document.getElementById('pw');
  const err=document.getElementById('lg-err');
  async function go(){
    const h=await sha(inp.value.trim());
    if(h===OK){
      document.getElementById('lg').style.display='none';
      document.querySelectorAll(ELS).forEach(el=>el.style.display='');
      buildDays(); buildTL();
    } else { err.textContent='password errata'; inp.value=''; inp.focus(); }
  }
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') go(); err.textContent=''; });
